    emptyReputationHistory: ไม่พบประวัติสำหรับผู้ใช้นี้...
    firstLoginModalContent: "<p>\n    Forum นี้ใช้ระบบ reputation แบบไดนามิกเพื่อสนับสนุนการมีส่วนร่วมเชิงบวกในชุมชน\n    ในฐานะผู้ใช้ คุณสามารถรับ reputation points โดยสนับสนุนโพสต์และปฏิสัมพันธ์อย่างมีความหมาย เช่น:\n    <ul>\n      <li>\n        สร้างโพสต์ใหม่: แบ่งปันความคิดและแนวคิดของคุณกับชุมชน\n      </li>\n      <li>\n        ตอบโพสต์: รับ points ตามคุณภาพของการตอบกลับของคุณ\n      </li>\n      <li>\n        รายงานผู้ใช้: ช่วยรักษาสภาพแวดล้อมที่แข็งแกร่งโดยรายงานพฤติกรรมที่ไม่เหมาะสม\n      </li>\n      <li>\n        ได้รับ like: แสดงความชื่นชมต่อโพสต์ของผู้อื่นและได้รับรางวัล\n      </li>\n      <li>\n        เขียนคำตอบที่ดีที่สุด: รับ points โดยสนับสนุนคำตอบที่แก้ปัญหาและถูกเลือกเป็น \"best answer\"\n      </li>\n    </ul>\n  </p>\n  <p>\n    รับ reputation points โดยทำหน้าที่เชิงบวก ช่วยเหลือผู้อื่น และสนับสนุนชุมชน การกระทำของคุณ\n    พูดได้มากกว่าคำพูด และทุกคะแนนคุณจะได้รับการยอมรับจากความพยายามของคุณ ทำให้การมีส่วนร่วมต่อไปและสร้าง reputation ของคุณ!\n  </p>\n"
