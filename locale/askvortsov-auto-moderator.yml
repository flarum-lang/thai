    automoderator_instructions:
      header: คำแนะนำการใช้ส่วนขยาย
      text: "<li>สรุปสั้นๆ: เมื่อผู้ใช้ตรงตามเกณฑ์ X ให้ทำ Y เมื่อผู้ใช้ไม่ตรงตามเกณฑ์ X อีกต่อไป ให้ทำ Z</li>\n<li><strong>เกณฑ์:</strong> เกณฑ์คือหัวใจของส่วนขยายนี้ เกณฑ์คือชุดของ metric และเงื่อนไขที่กำหนดเอง เมื่อผู้ใช้ตรงตามเกณฑ์ การกระทำ \"เมื่อได้รับ\" จะถูกดำเนินการ เมื่อผู้ใช้ไม่ตรงตามเกณฑ์อีกต่อไป การกระทำ \"เมื่อสูญเสีย\" จะถูกดำเนินการ</li>\n<ul>\n  <li><strong>Metric:</strong> เงื่อนไขเชิงตัวเลข เช่น จำนวนโพสต์หรือจำนวนการกดถูกใจที่ได้รับ เกณฑ์สามารถกำหนดช่วง/ขั้นต่ำ/ขั้นสูงของ metric ได้</li>\n  <li><strong>เงื่อนไข:</strong> เงื่อนไข boolean แบบนามธรรม เช่น ไม่ถูกระงับบัญชี หรืออีเมลตรงกับ regex ที่กำหนด</li>\n</ul>\n<li><strong>การกระทำ:</strong> สิ่งที่เกิดขึ้นโดยอัตโนมัติเมื่อตรงหรือไม่ตรงตามเกณฑ์ ตัวอย่างเช่น เพิ่ม/ลบกลุ่ม ส่งอีเมล หรือระงับบัญชีผู้ใช้</li>\n<li><strong>Trigger:</strong> ชุดของเหตุการณ์ที่จะทำให้ระบบตรวจสอบเกณฑ์ของผู้ใช้ใหม่ สิ่งเหล่านี้เป็นส่วนหนึ่งของนิยาม metric และเงื่อนไข เกณฑ์ทั้งหมดจะถูกประเมินเมื่อเข้าสู่ระบบ ซึ่งถือเป็น \"universal trigger\"</li>\n<li>การกระทำ \"เมื่อสูญเสีย\" จะทำงานก่อน \"เมื่อได้รับ\" เสมอ เพื่อให้การกระทำถูกดำเนินการตราบใดที่ผู้ใช้ตรงตามเกณฑ์ใดเกณฑ์หนึ่ง</li>\n<li>โปรดทราบว่าการกระทำจะทำงานเฉพาะ \"เมื่อสูญเสีย\" และ \"เมื่อได้รับ\" เท่านั้น การแก้ไขด้วยตนเองขณะที่ผู้ใช้ตรงตามเกณฑ์จะไม่ทำให้การกระทำ \"เมื่อได้รับ\" ถูกนำมาใช้ใหม่</li>\n<li>หากคุณลบเกณฑ์ การกระทำ \"เมื่อสูญเสีย\" จะไม่ถูกดำเนินการสำหรับผู้ใช้ที่ตรงตามเกณฑ์นั้นอยู่</li>\n<li>หากคุณใช้เกณฑ์เพื่อจัดการกลุ่ม เราแนะนำให้รักษากลุ่มแยกต่างหากเพื่อจัดการโดยเกณฑ์ คุณจะไม่สามารถเพิ่ม/ลบผู้ใช้ออกจากกลุ่มเหล่านี้ด้วยตนเองได้</li>\n"
